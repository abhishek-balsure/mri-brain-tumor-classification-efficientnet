<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Classifier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); max-width: 500px; width: 100%; padding: 40px; }
        h1 { color: #1a1a2e; text-align: center; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .upload-area { border: 2px dashed #ddd; border-radius: 15px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 20px; }
        .upload-area:hover { border-color: #4a90e2; background: #f8f9ff; }
        .upload-area.dragover { border-color: #4a90e2; background: #e8f0fe; }
        .upload-icon { font-size: 48px; margin-bottom: 15px; }
        .upload-text { color: #666; }
        .upload-text span { color: #4a90e2; font-weight: 600; }
        #fileInput { display: none; }
        .preview { margin-bottom: 20px; display: none; }
        .preview img { max-width: 100%; max-height: 200px; border-radius: 10px; }
        .inputs { display: flex; gap: 15px; margin-bottom: 20px; }
        .inputs input { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
        .inputs input:focus { outline: none; border-color: #4a90e2; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #4a90e2, #357abd); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .result { margin-top: 25px; padding: 20px; border-radius: 15px; display: none; }
        .result.success { background: #d4edda; border: 1px solid #c3e6cb; }
        .result.danger { background: #f8d7da; border: 1px solid #f5c6cb; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .result-title { font-size: 20px; font-weight: 700; }
        .result-title.tumor { color: #dc3545; }
        .result-title.no-tumor { color: #28a745; }
        .confidence { background: white; padding: 8px 15px; border-radius: 20px; font-weight: 600; font-size: 14px; }
        .details { font-size: 14px; line-height: 1.6; color: #333; }
        .details p { margin-bottom: 10px; }
        .loader { display: none; text-align: center; margin: 20px 0; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4a90e2; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Brain Tumor Classifier</h1>
        <p class="subtitle">MRI-based AI detection using EfficientNet-B0</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p class="upload-text">Drag & drop MRI image or <span>browse</span></p>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="preview" id="preview">
            <img id="previewImg" alt="Preview">
        </div>
        
        <div class="inputs">
            <input type="text" id="patientId" placeholder="Patient ID">
            <input type="text" id="doctorId" placeholder="Doctor ID">
        </div>
        
        <button class="btn" id="analyzeBtn" onclick="analyze()">Analyze MRI Scan</button>
        
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Analyzing MRI scan...</p>
        </div>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        async function analyze() {
            const file = fileInput.files[0];
            const patientId = document.getElementById('patientId').value;
            const doctorId = document.getElementById('doctorId').value;
            const resultDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('analyzeBtn');
            
            if (!file) { alert('Please select an MRI image'); return; }
            if (!patientId || !doctorId) { alert('Please enter Patient ID and Doctor ID'); return; }
            
            btn.disabled = true;
            loader.style.display = 'block';
            resultDiv.style.display = 'none';
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('patient_id', patientId);
            formData.append('doctor_id', doctorId);
            
            try {
                const response = await fetch('http://localhost:8000/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                loader.style.display = 'none';
                resultDiv.style.display = 'block';
                
                const isTumor = data.tumor_detected;
                resultDiv.className = 'result ' + (isTumor ? 'danger' : 'success');
                
                resultDiv.innerHTML = `
                    <div class="result-header">
                        <span class="result-title ${isTumor ? 'tumor' : 'no-tumor'}">
                            ${isTumor ? '⚠️ Tumor Detected' : '✅ No Tumor'}
                        </span>
                        <span class="confidence">${data.confidence_score}%</span>
                    </div>
                    <div class="details">
                        <p><strong>Type:</strong> ${data.tumor_type || 'N/A'}</p>
                        <p><strong>Location:</strong> ${data.tumor_location || 'N/A'}</p>
                        <p><strong>Notes:</strong> ${data.analysis_notes}</p>
                    </div>
                `;
            } catch (err) {
                loader.style.display = 'none';
                alert('Error: ' + err.message + '\nMake sure backend is running on port 8000');
            }
            
            btn.disabled = false;
        }
    </script>
</body>
</html>
